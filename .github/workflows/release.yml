name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Build release archive
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -eux
          mkdir -p dist/package
          go build -trimpath -ldflags="-s -w" -o dist/package/sim ./cmd/sim
          go build -trimpath -ldflags="-s -w" -o dist/package/showcase-bot ./cmd/showcase-bot
          cp README.md LICENSE dist/package/
          archive="local-telegram-client_${VERSION}_${GOOS}_${GOARCH}.tar.gz"
          tar -czf "dist/${archive}" -C dist/package .
          sha256sum "dist/${archive}" > "dist/${archive}.sha256"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
